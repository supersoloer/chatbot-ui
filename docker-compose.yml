version: '3.8'

services:
  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # 数据库连接（连接到外部数据库）
      DATABASE_URL: ${DATABASE_URL}

      # 应用配置
      NODE_ENV: production
      NEXT_PUBLIC_USER_FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-10485760}

      # Ollama (可选 - 本地模型)
      NEXT_PUBLIC_OLLAMA_URL: ${OLLAMA_URL:-}

      # AI API Keys (至少配置一个)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # Azure OpenAI (可选)
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_GPT_35_TURBO_NAME: ${AZURE_GPT_35_TURBO_NAME:-}
      AZURE_GPT_45_VISION_NAME: ${AZURE_GPT_45_VISION_NAME:-}
      AZURE_GPT_45_TURBO_NAME: ${AZURE_GPT_45_TURBO_NAME:-}
      AZURE_EMBEDDINGS_NAME: ${AZURE_EMBEDDINGS_NAME:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
